version: "3.8"
services:
  frontend:
    image: sujithmurali/myapp-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: sujithmurali/myapp-backend:latest
    ports:
      - "5001:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: myappdb

  db:
    image: sujithmurali/myapp-db:latest
    ports:
      - "5432:5432"